<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Registration</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: #1e293b;
        padding: 30px;
        border-radius: 12px;
        width: 350px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #38bdf8;
    }

    label {
        display: block;
        margin-top: 12px;
        font-size: 14px;
    }

    input, select {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 6px;
        border: none;
        outline: none;
        background: #334155;
        color: white;
        font-size: 14px;
    }

    input:focus, select:focus {
        border: 1px solid #38bdf8;
    }

    button {
        width: 100%;
        margin-top: 20px;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #38bdf8;
        color: black;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #0ea5e9;
    }

</style>
</head>

<body>

<div class="container">
    <h2>Student Registration</h2>

    <form onsubmit="return showDetails()">

        <label>Name</label>
        <input type="text" id="name" required>

        <label>Register Number</label>
        <input type="text" id="reg" required>

        <label>Branch</label>
        <select id="branch" required>
            <option value="">-- Select Branch --</option>
            <option>CSE</option>
            <option>CSM</option>
            <option>CSD</option>
            <option>ECE</option>
            <option>EEE</option>
        </select>

        <label>Percentage (0 - 10)</label>
        <input type="number" id="percentage" min="0" max="10" step="0.01" required>

        <button type="submit">Submit</button>

    </form>
</div>

<script>
function showDetails() {

    let name = document.getElementById("name").value;
    let reg = document.getElementById("reg").value;
    let branch = document.getElementById("branch").value;
    let percentage = document.getElementById("percentage").value;

    // Extra validation (don’t rely only on HTML)
    if (percentage < 0 || percentage > 10) {
        alert("Percentage must be between 0 and 10");
        return false;
    }

    alert(
        "Registration Successful!\n\n" +
        "Name: " + name + "\n" +
        "Register No: " + reg + "\n" +
        "Branch: " + branch + "\n" +
        "Percentage: " + percentage
    );

    return false; // prevent page reload
}
</script>

</body>
</html>
